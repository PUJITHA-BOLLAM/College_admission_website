<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Admission Portal</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="main-container">

        <div class="top-section">
            <h1>College Admission Portal</h1>
            <p>Complete your admission process by filling the application carefully.</p>
        </div>

        <form id="admissionForm">

            <!-- Personal Details -->
            <section class="card">
                <h2>Personal Details</h2>

                <div class="grid">

                    <div class="input-box">
                        <label>Full Name</label>
                        <input type="text" id="name" placeholder="Enter full name">
                    </div>

                    <div class="input-box">
                        <label>Father's Name</label>
                        <input type="text" placeholder="Enter father's name">
                    </div>

                    <div class="input-box">
                        <label>Mother's Name</label>
                        <input type="text" placeholder="Enter mother's name">
                    </div>

                    <div class="input-box">
                        <label>Date of Birth</label>
                        <input type="date">
                    </div>

                    <div class="input-box">
                        <label>Aadhar Number</label>
                        <input type="text" maxlength="12" placeholder="12 digit number">
                    </div>

                    <div class="input-box">
                        <label>Blood Group</label>

                        <select>
                            <option>A+</option>
                            <option>A-</option>
                            <option>B+</option>
                            <option>B-</option>
                            <option>O+</option>
                            <option>O-</option>
                            <option>AB+</option>
                            <option>AB-</option>
                        </select>
                    </div>

                </div>

                <div class="radio-section">
                    <label>Gender</label>

                    <div class="radio-group">
                        <label><input type="radio" name="gender"> Male</label>
                        <label><input type="radio" name="gender"> Female</label>
                        <label><input type="radio" name="gender"> Others</label>
                    </div>
                </div>

            </section>

            <!-- Contact -->
            <section class="card">
                <h2>Contact Details</h2>

                <div class="grid">

                    <div class="input-box">
                        <label>Mobile Number</label>
                        <input type="tel" placeholder="Enter mobile number">
                    </div>

                    <div class="input-box">
                        <label>Alternate Mobile</label>
                        <input type="tel" placeholder="Alternate mobile">
                    </div>

                    <div class="input-box">
                        <label>Email</label>
                        <input type="email" id="email" placeholder="Enter email">
                    </div>

                    <div class="input-box">
                        <label>City</label>
                        <input type="text" placeholder="Enter city">
                    </div>

                    <div class="input-box">
                        <label>State</label>
                        <input type="text" placeholder="Enter state">
                    </div>

                    <div class="input-box">
                        <label>Pincode</label>
                        <input type="number" placeholder="Enter pincode">
                    </div>

                </div>

                <div class="input-box">
                    <label>Address</label>
                    <textarea rows="4" placeholder="Enter address"></textarea>
                </div>

            </section>

            <!-- Academic -->
            <section class="card">
                <h2>Academic Details</h2>

                <div class="table-container">

                    <table>

                        <thead>
                            <tr>
                                <th>Qualification</th>
                                <th>Board</th>
                                <th>Year</th>
                                <th>Percentage</th>
                            </tr>
                        </thead>

                        <tbody>

                            <tr>
                                <td>10th</td>
                                <td><input type="text" placeholder="Board"></td>
                                <td><input type="number" placeholder="Year"></td>
                                <td><input type="number" placeholder="%"></td>
                            </tr>

                            <tr>
                                <td>12th</td>
                                <td><input type="text" placeholder="Board"></td>
                                <td><input type="number" placeholder="Year"></td>
                                <td><input type="number" placeholder="%"></td>
                            </tr>

                        </tbody>

                    </table>

                </div>

            </section>

            <!-- Course -->
            <section class="card">

                <h2>Course Selection</h2>

                <div class="input-box">
                    <label>Select Course</label>

                    <select>
                        <option>B.Tech</option>
                        <option>B.Sc</option>
                        <option>BBA</option>
                        <option>B.Com</option>
                        <option>BA</option>
                    </select>
                </div>

                <div class="checkbox-section">

                    <label>Preferred Branches</label>

                    <div class="checkbox-group">
                        <label><input type="checkbox"> CSE</label>
                        <label><input type="checkbox"> ECE</label>
                        <label><input type="checkbox"> EEE</label>
                        <label><input type="checkbox"> Mechanical</label>
                        <label><input type="checkbox"> Civil</label>
                    </div>

                </div>

                <div class="radio-section">
                    <label>Hostel Required</label>

                    <div class="radio-group">
                        <label><input type="radio" name="hostel"> Yes</label>
                        <label><input type="radio" name="hostel"> No</label>
                    </div>
                </div>

            </section>

            <!-- Upload -->
            <section class="card">

                <h2>Document Upload</h2>

                <div class="upload-box">
                    <label>Upload Photo</label>
                    <input type="file">
                </div>

                <div class="upload-box">
                    <label>Upload 10th Marksheet</label>
                    <input type="file">
                </div>

                <div class="upload-box">
                    <label>Upload 12th Marksheet</label>
                    <input type="file">
                </div>

            </section>

            <!-- Final -->
            <section class="card">

                <label class="declaration">
                    <input type="checkbox" required>
                    I declare that the above information is correct.
                </label>

            </section>

            <div class="button-section">
                <button type="submit">Submit Application</button>
                <button type="reset" class="reset-btn">Reset</button>
            </div>

        </form>

    </div>

<script src="script.js"></script>

</body>
</html>
